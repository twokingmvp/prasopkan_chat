<link rel="stylesheet" type="text/css" href="source/plugin/prasopkan_chat/static/css/style.css" />
<script src="source/plugin/prasopkan_chat/static/js/chat.js" type="text/javascript"></script>

<div id="pk-chat-head">
    <div class="pk-chat-head-icon">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"></path></svg>
    </div>
    <div id="pk-chat-badge" style="display:none;">1</div>
    <div id="pk-chat-tooltip">{$welcome_tooltip}</div>
    </div>

<div id="pk-chat-box" style="display: none;">
    <div id="pk-chat-header">
        <span class="pk-header-title">💬 Public Chat</span>
        <div class="pk-header-actions">
            <span id="pk-chat-shop-btn" class="pk-header-icon" title="ร้านค้าไอเทม">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"></path></svg>
            </span>
            <a href="home.php?mod=space&do=pm" target="_blank" class="pk-header-icon" title="ข้อความส่วนตัว">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"></path></svg>
            </a>
            <a href="home.php?mod=space&do=notice" target="_blank" class="pk-header-icon" title="การแจ้งเตือน">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"></path></svg>
            </a>
            <span id="pk-chat-settings-btn" title="ตั้งค่าแชท">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"></path></svg>
            </span>
            <span id="pk-chat-close-btn" title="ย่อแชท">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
            </span>
        </div>
    </div>
    
    <div id="pk-chat-settings-menu" style="display: none;">
        <div class="pk-setting-item"><span>โหมดมืด (Dark Mode)</span><label class="pk-switch"><input type="checkbox" id="pk-dark-mode-toggle"><span class="pk-slider"></span></label></div>
    </div>
    
    <div id="pk-chat-shop-modal" style="display: none;">
        <div class="pk-shop-header">
            <h3>ร้านค้าไอเทม 🛒</h3>
            <span id="pk-shop-credit">ยอดเงิน: <b id="pk-user-balance">0</b></span>
        </div>
        <div class="pk-shop-tabs">
            <div class="pk-shop-tab active" data-type="name_style">สีชื่อ</div>
            <div class="pk-shop-tab" data-type="badge">ป้ายฉายา</div>
            <div class="pk-shop-tab" data-type="bubble_skin">💬 กรอบคำพูด</div>
            <div class="pk-shop-tab" data-type="gacha" style="color:#d9363e; font-weight:bold;">🎁 สุ่มกาชา</div>
        </div>
        <div id="pk-shop-content" class="pk-shop-grid"></div>
        <div style="text-align:center; margin-top:10px;">
            <button id="pk-shop-close" class="pk-btn-close">ปิดร้านค้า</button>
        </div>
    </div>

    {$rooms_html}
    
    <div id="pk-chat-body">
        <div id="pk-chat-announcement"><span class="pk-announce-icon">📢</span><div class="pk-announce-text">{$admin_announcement}</div></div>
        <div id="pk-chat-messages"></div>
        <div id="pk-chat-typing-indicator" style="display:none;"><span id="pk-typing-names"></span> กำลังพิมพ์<span class="pk-dot-typing">...</span></div>

        <div id="pk-chat-emoji-picker" style="display: none;"></div>
        <div id="pk-chat-rp-modal" style="display: none;">
            <h3>แจกอั่งเปาเครดิต 🧧</h3>
            <input type="number" id="pk-rp-amount" class="pk-rp-input" placeholder="จำนวนเครดิตทั้งหมดที่จะแจก">
            <input type="number" id="pk-rp-count" class="pk-rp-input" placeholder="จำนวนซอง (แบ่งแจกกี่คน)">
            <div class="pk-rp-btn-group"><button id="pk-rp-cancel">ยกเลิก</button><button id="pk-rp-submit">โยนซอง!</button></div>
        </div>
        
        <div id="pk-chat-input-area">
            <button id="pk-chat-emoji-btn" class="pk-action-btn" type="button" title="ส่งอีโมจิ">😀</button>
            <button id="pk-chat-img-btn" class="pk-action-btn" type="button" title="ส่งรูปภาพ">📸</button>
            <input type="file" id="pk-chat-file-upload" accept="image/png, image/jpeg, image/gif, image/webp" style="display:none;">
            <button id="pk-chat-rp-btn" class="pk-action-btn" type="button" title="แจกอั่งเปา">🧧</button>
            <input type="text" id="pk-chat-input" placeholder="พิมพ์ข้อความ..." autocomplete="off">
            <button id="pk-chat-send" title="ส่งข้อความ"><svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></button>
        </div>
    </div>
</div>
