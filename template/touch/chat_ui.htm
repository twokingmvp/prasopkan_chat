<div id="pk-chat-head-container" style="position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; z-index: 999999;">
    
    <div id="pk-chat-head" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #4CA1AF, #0056cc); border-radius: 50%; box-shadow: 0 4px 15px rgba(0, 115, 255, 0.4); display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" style="width: 30px; height: 30px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </div>
    
    <div id="pk-chat-badge" style="display:none; position: absolute; top: -2px; left: -2px; background: #ff3b30; color: white; border-radius: 50%; min-width: 18px; height: 18px; line-height: 18px; text-align: center; font-size: 11px; font-weight: bold; border: 2px solid #ffffff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10;">1</div>

    <div id="pk-chat-head-close" title="ซ่อนปุ่มแชท" style="display:none; position: absolute; top: -4px; right: -4px; width: 24px; height: 24px; background: #ff3b30; color: white; border-radius: 50%; text-align: center; line-height: 22px; font-size: 12px; font-weight: bold; cursor: pointer; z-index: 20; box-shadow: 0 2px 6px rgba(0,0,0,0.4); border: 2px solid #ffffff; transition: transform 0.2s;">✖</div>
    
    <div id="pk-chat-tooltip" class="pk-tooltip-show" style="position: absolute; right: 75px; top: 12px; background: #ffffff; color: #333333; padding: 8px 14px; border-radius: 12px; font-size: 13px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.15); white-space: nowrap; border: 1px solid #f0f0f0; pointer-events: none;">{$welcome_tooltip}</div>
</div>

<div id="pk-chat-box" style="display:none;">
    <div id="pk-chat-header">
        <span class="pk-header-title">💬 Public Chat</span>
        <div class="pk-header-actions">
            <span id="pk-chat-shop-btn" title="ร้านค้าไอเทม">🛒</span>
            <span id="pk-chat-settings-btn" title="ตั้งค่า">⚙️</span>
            <span id="pk-chat-close-btn" title="ย่อแชท">🔽</span> 
        </div>
    </div>

    <div id="pk-chat-settings-menu" style="display:none;">
        <div class="pk-setting-item">
            <span>🌙 โหมดกลางคืน</span>
            <label class="pk-switch">
                <input type="checkbox" id="pk-dark-mode-toggle">
                <span class="pk-slider"></span>
            </label>
        </div>
    </div>

    <div id="pk-chat-rooms">
        {$rooms_html}
    </div>
    <div id="pk-chat-body">
        <div id="pk-chat-announcement">
            <span class="pk-announce-icon">📢</span>
            <span class="pk-announce-text">{$admin_announcement}</span>
        </div>
        <div id="pk-chat-messages">
            <div style="text-align:center; padding:15px; color:var(--pk-text-muted);">กำลังโหลด...</div>
        </div>
        <div id="pk-chat-typing-indicator" style="display:none;">
            <span id="pk-typing-names"></span> กำลังพิมพ์ <span class="pk-dot-typing"></span>
        </div>
    </div>

    <div id="pk-chat-input-area">
        <button class="pk-action-btn" id="pk-chat-emoji-btn" title="อีโมจิ">😀</button>
        <button class="pk-action-btn" id="pk-chat-img-btn" title="ส่งรูปภาพ">📷</button>
        <input type="file" id="pk-chat-file-upload" accept="image/*" style="display:none;">
        <button class="pk-action-btn" id="pk-chat-rp-btn" title="แจกอั่งเปา">🧧</button>
        <input type="text" id="pk-chat-input" placeholder="พิมพ์ข้อความ..." autocomplete="off">
        <button id="pk-chat-send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

    <div id="pk-chat-shop-modal" style="display:none;">
        <div class="pk-shop-header">
            <h3>🛒 ร้านค้าพรีเมียม</h3>
            <span id="pk-shop-credit"><span id="pk-user-balance">0</span></span>
        </div>
        <div class="pk-shop-tabs">
            <div class="pk-shop-tab active" data-type="name_style">สีชื่อตัวละคร</div>
            <div class="pk-shop-tab" data-type="bubble_skin">กรอบคำพูด</div>
            <div class="pk-shop-tab" data-type="gacha">สุ่มกาชาปอง</div>
        </div>
        <div class="pk-shop-grid" id="pk-shop-content"></div>
        <button class="pk-btn-close" id="pk-shop-close" style="margin-top:10px;">ปิดหน้าต่าง</button>
    </div>

    <div id="pk-chat-rp-modal" style="display:none;">
        <h3>🧧 แจกอั่งเปา</h3>
        <input type="number" id="pk-rp-amount" class="pk-rp-input" placeholder="จำนวนเครดิตทั้งหมด (เช่น 100)">
        <input type="number" id="pk-rp-count" class="pk-rp-input" placeholder="แบ่งกี่ซอง? (เช่น 5)">
        <div class="pk-rp-btn-group">
            <button id="pk-rp-cancel">ยกเลิก</button>
            <button id="pk-rp-submit">โยนซอง!</button>
        </div>
    </div>
    
    <div id="pk-chat-emoji-picker" style="display:none;"></div>
</div>

<div id="pk-chat-snooze-modal" style="display:none;">
    <div class="pk-snooze-content">
        <h4>ปิดการแจ้งเตือนแชท?</h4>
        <p>ปุ่มแชทจะถูกซ่อนไว้ชั่วคราวตามเวลาที่เลือก</p>
        <div class="pk-snooze-options">
            <button class="pk-snooze-btn" data-time="3600">ซ่อน 1 ชั่วโมง</button>
            <button class="pk-snooze-btn" data-time="86400">ซ่อน 24 ชั่วโมง</button>
            <button class="pk-snooze-btn" data-time="permanent">ซ่อนถาวร (จนกว่าจะเปิดเอง)</button>
        </div>
        <button id="pk-snooze-cancel">ยกเลิก</button>
    </div>
</div>
