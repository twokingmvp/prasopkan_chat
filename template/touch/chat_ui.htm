<div id="pk-chat-head-wrapper" style="position: fixed; bottom: 85px; left: 15px; width: 56px; height: 56px; z-index: 999999;">
    <div id="pk-chat-head-main" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #4CA1AF, #0056cc); border-radius: 50%; box-shadow: 0 4px 15px rgba(0, 115, 255, 0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" style="width: 28px; height: 28px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </div>
    <div id="pk-chat-badge-new" style="display:none; position: absolute; top: -2px; right: -2px; background: #ff3b30; color: white; border-radius: 50%; min-width: 18px; height: 18px; line-height: 18px; text-align: center; font-size: 11px; font-weight: bold; border: 2px solid #ffffff; z-index: 3; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">1</div>
    <div id="pk-chat-close-float" title="ซ่อนปุ่มแชท" style="display:none; position: absolute; top: -2px; left: -2px; width: 22px; height: 22px; background: #ff3b30; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; cursor: pointer; z-index: 3; border: 2px solid #ffffff; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">✖</div>
</div>

<div id="pk-chat-box" style="display:none;">
    <div id="pk-chat-header">
        <span class="pk-header-title">💬 Public Chat</span>
        <div class="pk-header-actions">
            <span id="pk-chat-shop-btn" title="ร้านค้าไอเทม">🛒</span>
            <span id="pk-chat-settings-btn" title="ตั้งค่า">⚙️</span>
            <span id="pk-chat-close-btn" title="ย่อแชท">🔽</span> 
        </div>
    </div>

    <div id="pk-chat-settings-menu" style="display:none;">
        <div class="pk-setting-item">
            <span>🌙 โหมดกลางคืน</span>
            <label class="pk-switch">
                <input type="checkbox" id="pk-dark-mode-toggle">
                <span class="pk-slider"></span>
            </label>
        </div>
    </div>

    <div id="pk-chat-rooms">
        {$rooms_html}
    </div>
    <div id="pk-chat-body">
        <div id="pk-chat-announcement">
            <span class="pk-announce-icon">📢</span>
            <span class="pk-announce-text">{$admin_announcement}</span>
        </div>
        <div id="pk-chat-messages">
            <div style="text-align:center; padding:15px; color:var(--pk-text-muted);">กำลังโหลด...</div>
        </div>
        <div id="pk-chat-typing-indicator" style="display:none;">
            <span id="pk-typing-names"></span> กำลังพิมพ์ <span class="pk-dot-typing"></span>
        </div>
    </div>

    <div id="pk-chat-input-area">
        <button class="pk-action-btn" id="pk-chat-emoji-btn" title="อีโมจิ">😀</button>
        <button class="pk-action-btn" id="pk-chat-img-btn" title="ส่งรูปภาพ">📷</button>
        <input type="file" id="pk-chat-file-upload" accept="image/*" style="display:none;">
        <button class="pk-action-btn" id="pk-chat-rp-btn" title="แจกอั่งเปา">🧧</button>
        <input type="text" id="pk-chat-input" placeholder="พิมพ์ข้อความ..." autocomplete="off">
        <button id="pk-chat-send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

    <div id="pk-chat-shop-modal" style="display:none;">
        <div class="pk-shop-header">
            <h3>🛒 ร้านค้าพรีเมียม</h3>
            <span id="pk-shop-credit"><span id="pk-user-balance">0</span></span>
        </div>
        <div class="pk-shop-tabs">
            <div class="pk-shop-tab active" data-type="name_style">สีชื่อตัวละคร</div>
            <div class="pk-shop-tab" data-type="bubble_skin">กรอบคำพูด</div>
            <div class="pk-shop-tab" data-type="gacha">สุ่มกาชาปอง</div>
        </div>
        <div class="pk-shop-grid" id="pk-shop-content"></div>
        <button class="pk-btn-close" id="pk-shop-close" style="margin-top:10px;">ปิดหน้าต่าง</button>
    </div>

    <div id="pk-chat-rp-modal" style="display:none;">
        <h3>🧧 แจกอั่งเปา</h3>
        <input type="number" id="pk-rp-amount" class="pk-rp-input" placeholder="จำนวนเครดิตทั้งหมด (เช่น 100)">
        <input type="number" id="pk-rp-count" class="pk-rp-input" placeholder="แบ่งกี่ซอง? (เช่น 5)">
        <div class="pk-rp-btn-group">
            <button id="pk-rp-cancel">ยกเลิก</button>
            <button id="pk-rp-submit">โยนซอง!</button>
        </div>
    </div>
    
    <div id="pk-chat-emoji-picker" style="display:none;"></div>
</div>

<div id="pk-chat-snooze-modal" style="display:none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000010; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
    <div style="background: var(--pk-bg, #fff); padding: 24px; border-radius: 20px; text-align: center; width: 100%; max-width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <h4 style="margin: 0 0 8px 0; color: var(--pk-text, #333); font-size: 18px;">ปิดการแจ้งเตือนแชท?</h4>
        <p style="font-size: 13px; color: var(--pk-text-muted, #888); margin-bottom: 20px;">ปุ่มแชทจะถูกซ่อนไว้ชั่วคราวตามเวลาที่เลือก</p>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;">
            <button class="pk-snooze-btn" data-time="3600" style="padding: 12px; border: 1px solid var(--pk-border, #eee); background: var(--pk-input-bg, #f9f9f9); color: var(--pk-text, #333); border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 14px;">ซ่อน 1 ชั่วโมง</button>
            <button class="pk-snooze-btn" data-time="86400" style="padding: 12px; border: 1px solid var(--pk-border, #eee); background: var(--pk-input-bg, #f9f9f9); color: var(--pk-text, #333); border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 14px;">ซ่อน 24 ชั่วโมง</button>
            <button class="pk-snooze-btn" data-time="permanent" style="padding: 12px; border: 1px solid var(--pk-border, #eee); background: var(--pk-input-bg, #f9f9f9); color: var(--pk-text, #333); border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 14px;">ซ่อนถาวร (จนกว่าจะเปิดเอง)</button>
        </div>
        <button id="pk-snooze-cancel" style="background: transparent; border: none; color: var(--pk-text-muted, #888); font-size: 14px; cursor: pointer; text-decoration: underline;">ยกเลิก</button>
    </div>
</div>
