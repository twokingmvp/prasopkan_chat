<link rel="stylesheet" type="text/css" href="source/plugin/prasopkan_chat/static/css/style.css" />
<script src="source/plugin/prasopkan_chat/static/js/chat.js" type="text/javascript"></script>

<div id="pk-chat-head">
    <div class="pk-chat-head-icon">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"></path></svg>
    </div>
</div>

<div id="pk-chat-box" style="display: none;">
    <div id="pk-chat-header">
        <span class="pk-header-title">💬 Public Chat</span>
        <span id="pk-chat-close-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
        </span>
    </div>
    
    {$rooms_html}
    
    <div id="pk-chat-body">
        <div id="pk-chat-messages"></div>
        
        <div id="pk-chat-typing-indicator" style="display:none;">
            <span id="pk-typing-names"></span> กำลังพิมพ์<span class="pk-dot-typing">...</span>
        </div>

        <div id="pk-chat-emoji-picker" style="display: none;"></div>
        <div id="pk-chat-rp-modal" style="display: none;">
            <h3>แจกอั่งเปาเครดิต 🧧</h3>
            <input type="number" id="pk-rp-amount" class="pk-rp-input" placeholder="จำนวนเครดิตทั้งหมดที่จะแจก">
            <input type="number" id="pk-rp-count" class="pk-rp-input" placeholder="จำนวนซอง (แบ่งแจกกี่คน)">
            <div class="pk-rp-btn-group">
                <button id="pk-rp-cancel">ยกเลิก</button>
                <button id="pk-rp-submit">โยนซอง!</button>
            </div>
        </div>
        
        <div id="pk-chat-input-area">
            <button id="pk-chat-emoji-btn" type="button" title="ส่งอีโมจิ">😀</button>
            <button id="pk-chat-img-btn" type="button" title="ส่งรูปภาพ">📸</button>
            <input type="file" id="pk-chat-file-upload" accept="image/png, image/jpeg, image/gif, image/webp" style="display:none;">
            <button id="pk-chat-rp-btn" type="button" title="แจกอั่งเปา">🧧</button>
            <input type="text" id="pk-chat-input" placeholder="พิมพ์ข้อความ...">
            <button id="pk-chat-send" title="ส่งข้อความ">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>
</div>
